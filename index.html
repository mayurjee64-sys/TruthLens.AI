<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruthLens</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1f44;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:700px;
text-align:center;
}

.logo{
font-size:42px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#a7c3ff;
margin-bottom:25px;
}

textarea{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-bottom:15px;
font-size:16px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.upload{
margin-bottom:15px;
}

.result{
margin-top:25px;
background:white;
color:black;
padding:20px;
border-radius:12px;
display:none;
text-align:left;
}

.score-bar{
height:12px;
background:#ddd;
border-radius:6px;
margin-top:10px;
overflow:hidden;
}

.score-fill{
height:100%;
background:#22c55e;
width:0%;
}

.section{
margin-top:15px;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body>

<div class="container">

<div class="logo">TruthLens</div>
<div class="subtitle">AI Fact Checking Tool</div>

<input id="apikey" placeholder="Enter OpenAI API Key">

<textarea id="claim" rows="4" placeholder="Paste claim or headline"></textarea>

<div class="upload">
<input type="file" id="imageUpload">
</div>

<button onclick="checkTruth()">Check Truth</button>

<div id="result" class="result"></div>

</div>

<script>

async function extractTextFromImage(file){

const { data } = await Tesseract.recognize(file,'eng')
return data.text

}

async function checkTruth(){

const apiKey=document.getElementById("apikey").value
let claim=document.getElementById("claim").value
const image=document.getElementById("imageUpload").files[0]

const result=document.getElementById("result")

result.style.display="block"
result.innerHTML="Analyzing..."

if(image && claim===""){
claim=await extractTextFromImage(image)
}

if(claim===""){
result.innerHTML="Please enter a claim or upload screenshot."
return
}

try{

const response=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},

body:JSON.stringify({

model:"gpt-4.1-mini",

messages:[
{
role:"system",
content:"You are a professional fact checker. Respond in JSON with fields: score (0-100), verdict, explanation, sources."
},
{
role:"user",
content:"Fact check this claim: "+claim
}
]

})

})

const data=await response.json()
const text=data.choices[0].message.content

let parsed

try{
parsed=JSON.parse(text)
}catch{
parsed={
score:50,
verdict:"Analysis",
explanation:text,
sources:"Not available"
}
}

displayResult(parsed)

}

catch(error){

result.innerHTML="Error connecting to OpenAI."

}

}

function displayResult(data){

const score=data.score || 50

document.getElementById("result").innerHTML=`

<h3>Truth Score: ${score}/100</h3>

<div class="score-bar">
<div class="score-fill" style="width:${score}%"></div>
</div>

<div class="section">
<b>Verdict:</b> ${data.verdict}
</div>

<div class="section">
<b>Explanation:</b><br>
${data.explanation}
</div>

<div class="section">
<b>Sources:</b><br>
${data.sources}
</div>

`

}

</script>

</body>
  </html>
